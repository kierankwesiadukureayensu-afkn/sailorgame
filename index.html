<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #0b1b2b, #000);
  font-family: Arial;
}

/* UI */
#ui {
  position: fixed;
  bottom: 20px;
  left: 20px;
  color: white;
}

.bar {
  width: 220px;
  height: 12px;
  background: #222;
  margin: 4px 0;
  border-radius: 5px;
  overflow: hidden;
}

#hp { height: 100%; background: red; width: 100%; }
#energy { height: 100%; background: cyan; width: 100%; }

#fruit, #mastery {
  margin-top: 6px;
  padding: 4px;
  background: rgba(0,0,0,0.5);
  border-radius: 4px;
}

#hotbar {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

#hotbar div {
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.1);
  border: 1px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<div id="ui">
  <div class="bar"><div id="hp"></div></div>
  <div class="bar"><div id="energy"></div></div>

  <div id="fruit">🍎 No Fruit</div>
  <div id="mastery">Mastery: 1</div>

  <div id="hotbar">
    <div>1</div><div>2</div><div>3</div><div>4</div>
  </div>
</div>

<script>
/********************
 PLAYER
********************/
let player = {
  x: 500,
  y: 500,
  hp: 100,
  maxHp: 100,
  energy: 100,
  maxEnergy: 100,
  power: 1,
  speed: 5
};

let keys = {};
let cooldown = false;

/********************
 FRUIT + MASTERY
********************/
let currentFruit = null;

let mastery = {
  level: 1,
  xp: 0
};

/********************
 BOSSES
********************/
let bosses = [
  { x: 900, y: 400, hp: 300 }
];

/********************
 INPUT
********************/
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/********************
 MOVEMENT
********************/
function move() {
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;
}

/********************
 COMBAT SYSTEM
********************/
function attack() {

  if (cooldown || player.energy < 10) return;

  cooldown = true;
  player.energy -= 10;

  bosses.forEach(b => {

    let d = Math.hypot(player.x - b.x, player.y - b.y);

    if (d < 120) {

      let dmg = 20 * player.power * getMultiplier();
      b.hp -= dmg;

      // hit feedback
      document.body.style.filter = "brightness(2)";
      setTimeout(() => document.body.style.filter = "", 80);

      gainMastery(5);
    }
  });

  setTimeout(() => cooldown = false, 250);
}

/********************
 FRUIT SYSTEM
********************/
function eatFruit() {

  if (currentFruit) return;

  currentFruit = { name: "Fire Fruit" };

  player.power += 2;

  document.getElementById("fruit").innerText =
    "🍎 " + currentFruit.name;
}

/********************
 MASTERY SYSTEM
********************/
function gainMastery(xp) {

  mastery.xp += xp;

  if (mastery.xp >= mastery.level * 20) {
    mastery.xp = 0;
    mastery.level++;
    player.power += 0.2;
  }

  document.getElementById("mastery").innerText =
    "Mastery: " + mastery.level;
}

function getMultiplier() {
  return 1 + mastery.level * 0.05;
}

/********************
 UI UPDATE
********************/
function updateUI() {

  document.getElementById("hp").style.width =
    (player.hp / player.maxHp * 100) + "%";

  document.getElementById("energy").style.width =
    (player.energy / player.maxEnergy * 100) + "%";
}

/********************
 SAVE / LOAD
********************/
function saveGame() {
  localStorage.setItem("save", JSON.stringify({
    player,
    mastery,
    currentFruit
  }));
}

function loadGame() {
  let data = JSON.parse(localStorage.getItem("save"));
  if (!data) return;

  player = data.player;
  mastery = data.mastery;
  currentFruit = data.currentFruit;

  if (currentFruit) {
    document.getElementById("fruit").innerText =
      "🍎 " + currentFruit.name;
  }
}

/********************
 LOOP
********************/
function loop() {

  move();
  updateUI();

  requestAnimationFrame(loop);
}

loop();

/********************
 CONTROLS
********************/
document.addEventListener("keydown", e => {

  if (e.key === " ") attack();
  if (e.key === "f") eatFruit();
  if (e.key === "p") saveGame();
  if (e.key === "o") loadGame();
});
</script>

</body>
</html>
