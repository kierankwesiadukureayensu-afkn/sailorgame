<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: #0d0d0d;
  overflow: hidden;
  font-family: Arial;
}

#player {
  position: absolute;
  width: 30px;
  height: 40px;
  background: linear-gradient(#111, #555);
  border: 2px solid cyan;
  border-radius: 6px;
}

.enemy {
  position: absolute;
  width: 30px;
  height: 40px;
  background: linear-gradient(#500, #a00);
  border: 2px solid red;
  border-radius: 6px;
}

.slash {
  position: absolute;
  width: 50px;
  height: 20px;
  background: linear-gradient(white, cyan);
  opacity: 0.8;
  border-radius: 10px;
}

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
}
</style>
</head>

<body>

<div id="player"></div>
<div id="ui">HP: 100 | Score: 0</div>

<script>
let player = {
  x: 300,
  y: 300,
  hp: 100,
  speed: 4
};

let keys = {};
let enemies = [];
let score = 0;

const playerEl = document.getElementById("player");
const ui = document.getElementById("ui");

/******** INPUT ********/
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/******** SPAWN ENEMIES ********/
setInterval(() => {
  let e = document.createElement("div");
  e.className = "enemy";

  let enemy = {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    hp: 30,
    el: e
  };

  document.body.appendChild(e);
  enemies.push(enemy);

}, 2000);

/******** ATTACK ********/
function attack() {

  let slash = document.createElement("div");
  slash.className = "slash";

  slash.style.left = player.x + "px";
  slash.style.top = player.y + "px";

  document.body.appendChild(slash);

  setTimeout(() => slash.remove(), 150);

  enemies.forEach((e, i) => {

    let dist = Math.hypot(player.x - e.x, player.y - e.y);

    if (dist < 80) {
      e.hp -= 20;

      if (e.hp <= 0) {
        e.el.remove();
        enemies.splice(i, 1);
        score += 10;
      }
    }
  });
}

/******** GAME LOOP ********/
function loop() {

  // movement
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;

  playerEl.style.left = player.x + "px";
  playerEl.style.top = player.y + "px";

  // enemy AI
  enemies.forEach(e => {

    let dx = player.x - e.x;
    let dy = player.y - e.y;

    let dist = Math.hypot(dx, dy);

    if (dist > 1) {
      e.x += dx / dist * 1.5;
      e.y += dy / dist * 1.5;
    }

    // damage player
    if (dist < 30) {
      player.hp -= 0.2;
    }

    e.el.style.left = e.x + "px";
    e.el.style.top = e.y + "px";
  });

  // update UI
  ui.innerText = "HP: " + Math.floor(player.hp) + " | Score: " + score;

  if (player.hp <= 0) {
    alert("Game Over! Score: " + score);
    location.reload();
  }

  requestAnimationFrame(loop);
}

loop();

/******** CONTROLS ********/
document.addEventListener("keydown", e => {
  if (e.key === " ") attack();
});
</script>

</body>
</html>
